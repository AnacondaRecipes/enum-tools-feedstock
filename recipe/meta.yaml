{% set name = "enum-tools" %}
{% set version = "0.13.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/domdfcoding/{{ name.replace('-', '_')}}/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 1475c7b42d5ae7e4049c9c5dfa91bf9a1e977da7e21b469aebb88f8cfa01ba6c
  patches:
    - patches/0001-disable-sphinx_toolbox-in-conftest.patch

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: True  # [py<37]

requirements:
  build:
    - patch  # [not win]
    - m2-patch  # [win]
  host:
    - python
    - pip
    - whey >=0.0.20
  run:
    - python
    - pygments >=2.6.1
    - typing-extensions >=3.7.4.3
  run_constrained:
    - sphinx >=3.4.0
    - sphinx-toolbox >=2.16.0
    - sphinx-jinja2-compat >=0.1.1

# ModuleNotFoundError: No module named 'sphinx_toolbox'
{% set ignore_tests = " --ignore=tests/test_autoenum.py" %}

test:
  source_files:
    - tests
  imports:
    - enum_tools
  commands:
    - pip check
    - python -c "from importlib.metadata import version; assert(version('{{ name }}')=='{{ version }}')"
    - pytest -v {{ ignore_tests }} tests
  requires:
    - pip
    - pytest >=6.0.0
    - sphinx >=3.2.1
    - coincidence >=0.2.0
    - bs4
    - defusedxml

about:
  home: https://github.com/domdfcoding/enum_tools
  summary: Tools to expand Python's enum module.
  license: LGPL-3.0-or-later
  license_family: LGPL
  license_file: LICENSE
  description: Tools to expand Python's enum module.
  doc_url: https://enum-tools.readthedocs.io
  dev_url: https://github.com/domdfcoding/enum_tools

extra:
  recipe-maintainers:
    - jan-janssen
    - domdfcoding
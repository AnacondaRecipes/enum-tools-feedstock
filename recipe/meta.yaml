{% set name = "enum-tools" %}
{% set version = "0.13.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_')}}-{{ version }}.tar.gz
  sha256: 0d13335e361d300dc0f8fd82c8cf9951417246f9676144f5ee1761eb690228eb

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: True  # [py<37]

requirements:
  host:
    - python
    - pip
    - wheel
    - setuptools
    - whey >=0.0.20
  run:
    - python
    - pygments >=2.6.1
    - typing-extensions >=3.7.4.3
  run_constrained:
    - sphinx >=3.4.0
    - sphinx-toolbox >=2.16.0
    - sphinx-jinja2-compat >=0.1.1

# We can`t enable pytest because conftest uses the coincidence package, which is unavailable on the main channel.
# The policy states that packages are not specifically built for testing.
test:
  imports:
    - enum_tools
  commands:
    - pip check
    - python -c "from importlib.metadata import version; assert(version('{{ name }}')=='{{ version }}')"
  requires:
    - pip

about:
  home: https://github.com/domdfcoding/enum_tools
  summary: Tools to expand Python's enum module.
  license: LGPL-3.0-or-later
  license_family: LGPL
  license_file: LICENSE
  description: Tools to expand Python's enum module.
  doc_url: https://enum-tools.readthedocs.io
  dev_url: https://github.com/domdfcoding/enum_tools

extra:
  recipe-maintainers:
    - jan-janssen
    - domdfcoding